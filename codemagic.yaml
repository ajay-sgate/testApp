workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --legacy-peer-deps
          cd ..

      - name: Build iOS
        script: |
          xcodebuild build \
          -workspace ios/*.xcworkspace \
          -scheme $(xcodebuild -list -workspace ios/*.xcworkspace | grep -A 1 "Schemes:" | tail -n 1 | xargs) \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/ios/iphoneos/*.app
